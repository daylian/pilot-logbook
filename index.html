        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        input, select, textarea { font-size: 16px !important; }
        .app-container { min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
        .autocomplete-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #e5e7eb; }
        .autocomplete-item:hover { background: #f3f4f6; }
        .install-prompt { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2563EB; color: white; padding: 12px 24px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000; display: none; }
        .install-prompt.show { display: block; }
        .capture-overlay { position: fixed; inset: 0; background: black; z-index: 2000; display: flex; flex-direction: column; }
        .capture-video { width: 100%; height: 100%; object-fit: cover; }
        .guide-box { position: absolute; border: 4px solid #34d399; border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); pointer-events: none; }
        .capture-label { position: absolute; top: 16px; left: 0; right: 0; text-align: center; color: white; font-weight: bold; font-size: 18px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); padding: 0 16px; }
        .capture-shutter { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; border-radius: 50%; background: white; border: 4px solid #ddd; }
        .capture-cancel { position: absolute; top: 16px; right: 16px; color: white; background: rgba(0,0,0,0.5); border: none; border-radius: 6px; padding: 8px 14px; font-weight: bold; }
    </style>

<body>
    <div id="root"></div>
    <div id="install-prompt" class="install-prompt">
        <span>Install Pilot Logbook for offline use!</span>
        <button onclick="installApp()" style="margin-left: 12px; background: white; color: #2563EB; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer;">Install</button>
        <button onclick="dismissInstall()" style="margin-left: 8px; background: transparent; color: white; border: 1px solid white; padding: 6px 12px; border-radius: 4px; cursor: pointer;">Later</button>
    </div>

    <script>
        // Register Service Worker (caches app + OCR engine for offline use)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registered: ', registration);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }

        // PWA Install Prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-prompt').classList.add('show');
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    }
                    deferredPrompt = null;
                    document.getElementById('install-prompt').classList.remove('show');
                });
            }
        }

        function dismissInstall() {
            document.getElementById('install-prompt').classList.remove('show');
        }
    </script>

        const lookupAircraft = (code) => {
            const upper = code.toUpperCase().trim();
            return AIRCRAFT_DB[upper] || null;
        };

        // --- Photo capture helpers (grayscale + threshold + crop, all client-side) ---
        const GUIDE_BOXES = {
            registration: { xPct: 0.08, yPct: 0.35, wPct: 0.84, hPct: 0.28 },
            fms:          { xPct: 0.05, yPct: 0.20, wPct: 0.90, hPct: 0.60 }
        };

        // Crop a subregion from an existing canvas (used for FMS top-left reg pass)
        const cropCanvasRegion = (sourceCanvas, xPct, yPct, wPct, hPct) => {
            const x = Math.floor(sourceCanvas.width  * xPct);
            const y = Math.floor(sourceCanvas.height * yPct);
            const w = Math.floor(sourceCanvas.width  * wPct);
            const h = Math.floor(sourceCanvas.height * hPct);
            const out = document.createElement('canvas');
            out.width  = w;
            out.height = h;
            out.getContext('2d').drawImage(sourceCanvas, x, y, w, h, 0, 0, w, h);
            return out;
        };

        const cropCanvasFromVideo = (video, box) => {
            const vw = video.videoWidth;
            const vh = video.videoHeight;
            const x = vw * box.xPct;
            const y = vh * box.yPct;
            const w = vw * box.wPct;
            const h = vh * box.hPct;
            const cropped = document.createElement('canvas');
            cropped.width = w;
            cropped.height = h;
            cropped.getContext('2d').drawImage(video, x, y, w, h, 0, 0, w, h);
            return cropped;
        };

        // Upscale a canvas — Tesseract accuracy improves sharply once character
        // height exceeds ~30px, so small crops get scaled before OCR.
        const upscaleCanvas = (canvas, factor = 2) => {
            if (factor <= 1) return canvas;
            const out = document.createElement('canvas');
            out.width  = canvas.width  * factor;
            out.height = canvas.height * factor;
            const ctx = out.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(canvas, 0, 0, out.width, out.height);
            return out;
        };

        // Otsu's method: compute the optimal binarization threshold from the
        // image's own gray histogram. Adapts automatically to any lighting —
        // bright day cockpit, dim night panel, glare — no hardcoded guesses.
        const otsuThreshold = (grayHist, totalPixels) => {
            let sum = 0;
            for (let i = 0; i < 256; i++) sum += i * grayHist[i];
            let sumB = 0, wB = 0, maxVar = 0, threshold = 128;
            for (let t = 0; t < 256; t++) {
                wB += grayHist[t];
                if (wB === 0) continue;
                const wF = totalPixels - wB;
                if (wF === 0) break;
                sumB += t * grayHist[t];
                const mB = sumB / wB;
                const mF = (sum - sumB) / wF;
                const between = wB * wF * (mB - mF) * (mB - mF);
                if (between > maxVar) { maxVar = between; threshold = t; }
            }
            return threshold;
        };

        // Non-destructive preprocessing: returns a NEW canvas.
        // Pipeline: auto-brightness normalize → Otsu threshold → binarize
        // (optionally inverted for light-text-on-dark-badge cases).
        const makeOcrVariant = (sourceCanvas, invert = false) => {
            const out = document.createElement('canvas');
            out.width = sourceCanvas.width;
            out.height = sourceCanvas.height;
            const ctx = out.getContext('2d');
            ctx.drawImage(sourceCanvas, 0, 0);
            const imageData = ctx.getImageData(0, 0, out.width, out.height);
            const data = imageData.data;

            // Pass 1: brightness scan + histogram
            let maxGray = 0;
            const grays = new Float32Array(data.length / 4);
            for (let i = 0, j = 0; i < data.length; i += 4, j++) {
                const g = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                grays[j] = g;
                if (g > maxGray) maxGray = g;
            }
            const scale = maxGray > 10 ? (255 / maxGray) : 1;

            const hist = new Uint32Array(256);
            for (let j = 0; j < grays.length; j++) {
                const v = Math.min(255, Math.round(grays[j] * scale));
                grays[j] = v;
                hist[v]++;
            }
            const threshold = otsuThreshold(hist, grays.length);

            // Pass 2: binarize
            for (let i = 0, j = 0; i < data.length; i += 4, j++) {
                const above = grays[j] > threshold;
                const val = invert ? (above ? 0 : 255) : (above ? 255 : 0);
                data[i] = data[i+1] = data[i+2] = val;
            }
            ctx.putImageData(imageData, 0, 0);
            return out;
        };

        // Persistent Tesseract worker — created once, reused for every pass.
        // Avoids re-downloading/re-initializing the OCR engine per recognition,
        // which cuts multi-pass pipeline time dramatically.
        let _ocrWorkerPromise = null;
        const getOcrWorker = () => {
            if (!_ocrWorkerPromise) {
                _ocrWorkerPromise = Tesseract.createWorker('eng');
            }
            return _ocrWorkerPromise;
        };

        // Map common Tesseract letter/digit confusions back to letters —
        // registrations are all-alpha, so any digit is a misread.
        const fixRegOcr = (s) => s
            .replace(/0/g, 'O').replace(/2/g, 'Z').replace(/5/g, 'S')
            .replace(/6/g, 'G').replace(/1/g, 'I').replace(/8/g, 'B');

        const Plane = () => (<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>);

        const Camera = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>);

        function PilotLogbook() {
            const [flights, setFlights] = useState([]);
            const [crewMembers, setCrewMembers] = useState([]);
            const [aircraftRegistry, setAircraftRegistry] = useState([]);
            const [currentFlight, setCurrentFlight] = useState({
                date: new Date().toISOString().split('T')[0], aircraft: '', aircraftInfo: null, tailNumber: '', registration: '', from: '', to: '', out: '', off: '', on: '', in: '', flightTime: '', airTime: '', totalTime: '', pic: '', sic: '', simPIC: '', simSIC: '', night: '', day: '', instrument: '', dayTakeoffs: 0, nightTakeoffs: 0, dayLandings: 0, nightLandings: 0, approaches: 0, crewMember: '', role: 'First Officer', remarks: ''

            const [showSettings, setShowSettings] = useState(false);
            const [useLocalTime, setUseLocalTime] = useState(false);
            const [showAutocomplete, setShowAutocomplete] = useState(false);

            const [editingFlight, setEditingFlight] = useState(null);
            const autocompleteRef = useRef(null);
            const tailAutocompleteRef = useRef(null);
            const regAutocompleteRef = useRef(null);

            // --- Photo capture state ---
            const [captureStep, setCaptureStep] = useState(null); // null | 'registration' | 'fms' | 'processing' | 'tailEntry' | 'review'
            const [captureStream, setCaptureStream] = useState(null);
            const [capturedRegCanvas, setCapturedRegCanvas] = useState(null);
            const [capturedFmsCanvas, setCapturedFmsCanvas] = useState(null);
            const [ocrResult, setOcrResult] = useState(null);
            const [tailEntryValue, setTailEntryValue] = useState('');
            const [captureError, setCaptureError] = useState('');
            const videoRef = useRef(null);

            useEffect(() => {
                const saved = localStorage.getItem('pilotLogFlights');
                const savedCrew = localStorage.getItem('pilotLogCrewMembers');
                const savedAircraft = localStorage.getItem('pilotLogAircraftRegistry');
                if (saved) setFlights(JSON.parse(saved));
                if (savedCrew) setCrewMembers(JSON.parse(savedCrew));
                if (savedAircraft) setAircraftRegistry(JSON.parse(savedAircraft));
            }, []);

            useEffect(() => { localStorage.setItem('pilotLogFlights', JSON.stringify(flights)); }, [flights]);
            useEffect(() => { localStorage.setItem('pilotLogCrewMembers', JSON.stringify(crewMembers)); }, [crewMembers]);
            useEffect(() => { localStorage.setItem('pilotLogAircraftRegistry', JSON.stringify(aircraftRegistry)); }, [aircraftRegistry]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (autocompleteRef.current && !autocompleteRef.current.contains(event.target)) {
                        setShowAutocomplete(false);
                    }
                    if (tailAutocompleteRef.current && !tailAutocompleteRef.current.contains(event.target)) {
                        setShowTailAutocomplete(false);
                    }
                    if (regAutocompleteRef.current && !regAutocompleteRef.current.contains(event.target)) {
                        setShowRegAutocomplete(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            // Attach the live camera stream to the video element whenever it's visible
            useEffect(() => {
                if (captureStream && videoRef.current) {
                    videoRef.current.srcObject = captureStream;
                }
            }, [captureStream, captureStep]);

            const calculateTimeDiff = (start, end) => {
                if (!start || !end) return '';
                const s = new Date(`2000-01-01T${start}${useLocalTime ? '' : 'Z'}`);
                const e = new Date(`2000-01-01T${end}${useLocalTime ? '' : 'Z'}`);
                let diff = (e - s) / 3600000;
                if (diff < 0) diff += 24;
                return diff.toFixed(1);
            };

            // ── SunCalc: sunrise/sunset for a given date + lat/lon ──────────────
            // Embedded algorithm (no CDN needed — works fully offline).
            // Based on NOAA solar calculation formulas.
            const getSunTimes = (date, lat, lon) => {
                const rad = Math.PI / 180;
                const J1970 = 2440588, J2000 = 2451545;
                const toJulian = d => d / 86400000 + J1970 - 0.5;
                const toDays = d => toJulian(d) - J2000;

                const e = rad * 23.4397; // obliquity of Earth
                const rightAscension = (l, b) => Math.atan2(Math.sin(l) * Math.cos(e) - Math.tan(b) * Math.sin(e), Math.cos(l));
                const declination = (l, b) => Math.asin(Math.sin(b) * Math.cos(e) + Math.cos(b) * Math.sin(e) * Math.sin(l));
                const azimuth = (H, phi, dec) => Math.atan2(Math.sin(H), Math.cos(H) * Math.sin(phi * rad) - Math.tan(dec) * Math.cos(phi * rad));
                const altitude = (H, phi, dec) => Math.asin(Math.sin(phi * rad) * Math.sin(dec) + Math.cos(phi * rad) * Math.cos(dec) * Math.cos(H));
                const siderealTime = (d, lw) => rad * (280.16 + 360.9856235 * d) - lw;
                const solarMeanAnomaly = d => rad * (357.5291 + 0.98560028 * d);
                const eclipticLongitude = M => {
                    const C = rad * (1.9148 * Math.sin(M) + 0.0200 * Math.sin(2 * M) + 0.0003 * Math.sin(3 * M));
                    const P = rad * 102.9372;
                    return M + C + P + Math.PI;
                };
                const sunCoords = d => {
                    const M = solarMeanAnomaly(d);
                    const L = eclipticLongitude(M);
                    return { dec: declination(L, 0), ra: rightAscension(L, 0) };
                };
                const julianCycle = (d, lw) => Math.round(d - 0.0009 - lw / (2 * Math.PI));
                const approxTransit = (Ht, lw, n) => 0.0009 + (Ht + lw) / (2 * Math.PI) + n;
                const solarTransitJ = (ds, M, L) => J2000 + ds + 0.0053 * Math.sin(M) - 0.0069 * Math.sin(2 * L);
                const hourAngle = (h, phi, d) => Math.acos((Math.sin(h) - Math.sin(phi * rad) * Math.sin(d)) / (Math.cos(phi * rad) * Math.cos(d)));
                const observerAngle = -0.833; // degrees, accounts for refraction + solar disc

                const lw = rad * -lon;
                const d = toDays(date.getTime());
                const n = julianCycle(d, lw);
                const ds = approxTransit(0, lw, n);
                const M = solarMeanAnomaly(ds);
                const L = eclipticLongitude(M);
                const dec = declination(L, 0);
                const Jnoon = solarTransitJ(ds, M, L);

                const h0 = (observerAngle) * rad;
                let Jset, Jrise;
                try {
                    const w0 = hourAngle(h0, lat, dec);
                    const ds0 = approxTransit(w0, lw, n);
                    Jset = solarTransitJ(ds0, M, L);
                    Jrise = Jnoon - (Jset - Jnoon);
                } catch(e) {
                    // Polar day/night — sun never sets or rises
                    return { sunrise: null, sunset: null };
                }

                const fromJulian = j => new Date((j + 0.5 - J1970) * 86400000);
                return { sunrise: fromJulian(Jrise), sunset: fromJulian(Jset) };
            };

            // ICAO airport coordinates (common Canadian/US/Euro ports)
            const AIRPORT_COORDS = {
                CYVR: [49.1947, -123.1792], CYYZ: [43.6772, -79.6306], CYUL: [45.4706, -73.7408],
                CYOW: [45.3225, -75.6692], CYYC: [51.1139, -114.0200], CYEG: [53.3097, -113.5797],
                CYHZ: [44.8808, -63.5086], CYYJ: [48.6469, -123.4258], CYHM: [43.1736, -79.9350],
                CYQT: [48.3719, -89.3239], CYXS: [53.8894, -122.6797], CYXJ: [56.2369, -120.7400],
                CYXX: [49.0253, -122.3608], CYQR: [50.4319, -104.6658], CYWG: [49.9100, -97.2397],
                KMCO: [28.4294, -81.3089], KLAS: [36.0840, -115.1537], KJFK: [40.6413, -73.7781],
                KLAX: [33.9425, -118.4081], KSEA: [47.4502, -122.3088], KORD: [41.9742, -87.9073],
                KDFW: [32.8998, -97.0403], KATL: [33.6407, -84.4277], KDEN: [39.8561, -104.6737],
                MMPR: [20.6801, -105.2544],
                LFBD: [44.8283, -0.7156], LFMK: [43.2161, 2.3063], GAAR: [15.5500, -13.5667],
                PAAQ: [61.5945, -149.0822], PAEN: [60.5731, -151.2453], PANC: [61.1744, -149.9964],
                PAFA: [64.8151, -147.8561], PAKN: [58.6768, -156.6492], PAMC: [62.9530, -155.6063],
                PABE: [60.7787, -161.8380],
                CYHU: [45.5175, -73.4161], CYYT: [47.6186, -52.7519],
                CYHM: [43.1736, -79.9350], CYQB: [46.7911, -71.3933],
                CYZF: [62.4628, -114.4400], CYXE: [52.1708, -106.6997],
                CYLW: [49.9561, -119.3778], CYVK: [50.1456, -122.9583],
                MMTJ: [32.5411, -116.9700], KPHX: [33.4373, -112.0078],
                KSFO: [37.6213, -122.3790], KIAH: [29.9902, -95.3368],
                KMIA: [25.7959, -80.2870],  KJAX: [30.4941, -81.6879],
            };

            // Calculate day/night split properly using actual sunrise/sunset
            // for the departure airport on the flight date.
            const calculateDayNight = (offTime, onTime, airTime, flightDate, fromIcao) => {
                if (!offTime || !onTime || !airTime) return { day: '', night: '' };

                const coords = fromIcao ? AIRPORT_COORDS[fromIcao.toUpperCase()] : null;

                // Fallback if airport unknown: use UTC 06-18 heuristic
                if (!coords || !flightDate) {
                    const takeoffHour = parseInt(offTime.split(':')[0]);
                    if (takeoffHour >= 6 && takeoffHour < 18) {
                        return { day: airTime, night: '' };
                    } else {
                        return { day: '', night: airTime };
                    }
                }

                const [lat, lon] = coords;
                const dateObj = new Date(flightDate + 'T00:00:00Z');
                const { sunrise, sunset } = getSunTimes(dateObj, lat, lon);

                if (!sunrise || !sunset) {
                    // Polar conditions — assign all to day (conservative)
                    return { day: airTime, night: '' };
                }

                // Convert OFF and ON to Date objects on the flight date
                // Handle overnight: if ON < OFF, ON is next day
                const [offH, offM] = offTime.split(':').map(Number);
                const [onH, onM] = onTime.split(':').map(Number);
                let offDate = new Date(flightDate + 'T' + offTime + ':00Z');
                let onDate  = new Date(flightDate + 'T' + onTime  + ':00Z');
                if (onDate <= offDate) onDate = new Date(onDate.getTime() + 86400000);

                const totalMs = onDate - offDate;
                if (totalMs <= 0) return { day: airTime, night: '' };

                // Clamp sunrise/sunset to the flight window and calculate overlap
                const dayStart = Math.max(offDate.getTime(), sunrise.getTime());
                const dayEnd   = Math.min(onDate.getTime(),  sunset.getTime());
                const dayMs    = Math.max(0, dayEnd - dayStart);
                const nightMs  = totalMs - dayMs;

                const dayHrs   = (dayMs   / 3600000).toFixed(1);
                const nightHrs = (nightMs / 3600000).toFixed(1);

                return {
                    day:   parseFloat(dayHrs)   > 0 ? dayHrs   : '',
                    night: parseFloat(nightHrs) > 0 ? nightHrs : ''
                };
            };

            // FIXED: PIC and Day/Night now always recalculate from OUT/IN and OFF/ON
            // instead of using `p.pic || flightTime` style fallbacks, which preserved
            // stale values (the bug behind the 19.0 / 19.3 carry-over issue).
            useEffect(() => {
                if (currentFlight.out && currentFlight.in) {
                    const flightTime = calculateTimeDiff(currentFlight.out, currentFlight.in);
                    setCurrentFlight(p => ({
                        ...p,
                        flightTime: flightTime,
                        totalTime: flightTime,
                        pic: flightTime
                    }));
                }
                if (currentFlight.off && currentFlight.on) {
                    const airTime = calculateTimeDiff(currentFlight.off, currentFlight.on);
                    const dayNight = calculateDayNight(
                        currentFlight.off,
                        currentFlight.on,
                        airTime,
                        currentFlight.date,
                        currentFlight.from
                    );
                    setCurrentFlight(p => ({
                        ...p,
                        airTime: airTime,
                        day: dayNight.day,
                        night: dayNight.night
                    }));
                }
            }, [currentFlight.out, currentFlight.in, currentFlight.off, currentFlight.on, currentFlight.date, currentFlight.from, useLocalTime]);

            const handleAircraftChange = (value) => {
                const aircraftInfo = lookupAircraft(value);

            const handleCrewMemberChange = (value) => {

            const selectCrewMember = (member) => {

            const selectAircraftByTail = (aircraft) => {

                setCurrentFlight({ date: new Date().toISOString().split('T')[0], aircraft: '', aircraftInfo: null, tailNumber: '', registration: '', from: '', to: '', out: '', off: '', on: '', in: '', flightTime: '', airTime: '', totalTime: '', pic: '', sic: '', simPIC: '', simSIC: '', night: '', day: '', instrument: '', dayTakeoffs: 0, nightTakeoffs: 0, dayLandings: 0, nightLandings: 0, approaches: 0, crewMember: '', role: 'First Officer', remarks: '' });

            };

            // ============================================================
            // PHOTO CAPTURE / OCR PIPELINE
            // ============================================================

            const startCapture = async () => {
                setCaptureError('');
                // Warm the OCR engine in the background while the user frames
                // photos — by shutter time it's initialized and ready.
                getOcrWorker();
                try {
                    const s = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 3840 }, height: { ideal: 2160 } }
                    });
                    setCaptureStream(s);
                    setCaptureStep('registration');
                } catch (err) {
                    setCaptureError('Could not access camera: ' + err.message);
                }
            };

            const stopStream = () => {
                if (captureStream) {
                    captureStream.getTracks().forEach(t => t.stop());
                }
                setCaptureStream(null);
            };

            const cancelCapture = () => {
                stopStream();
                setCaptureStep(null);
                setCapturedRegCanvas(null);
                setCapturedFmsCanvas(null);
                setOcrResult(null);
                setTailEntryValue('');
                setCaptureError('');
            };

            const handleShutter = async () => {
                if (!videoRef.current) return;

                // Store RAW crops — all preprocessing happens in the pipeline,
                // which tries multiple variants (inverted / normal / thresholds)
                // and keeps the first that yields a valid read. A single
                // destructive pass at capture time left no fallback when the
                // chosen variant failed.
                if (captureStep === 'registration') {
                    const cropped = cropCanvasFromVideo(videoRef.current, GUIDE_BOXES.registration);
                    setCapturedRegCanvas(cropped);
                    setCaptureStep('fms');
                    return;
                }

                if (captureStep === 'fms') {
                    const cropped = cropCanvasFromVideo(videoRef.current, GUIDE_BOXES.fms);
                    setCapturedFmsCanvas(cropped);
                    stopStream();
                    setCaptureStep('processing');
                    await runOcrPipeline(capturedRegCanvas, cropped);
                    return;
                }
            };

            const runOcrPipeline = async (regCanvas, fmsCanvas) => {
                try {
                    const worker = await getOcrWorker();

                    // ── FMS pass first (default page-segmentation params) ──
                    // Upscale 2x if the crop is small, Otsu-binarize, recognize.
                    let fmsInput = fmsCanvas.width < 1400 ? upscaleCanvas(fmsCanvas, 2) : fmsCanvas;
                    fmsInput = makeOcrVariant(fmsInput, false);
                    await worker.setParameters({
                        tessedit_pageseg_mode: '3',
                        tessedit_char_whitelist: ''
                    });
                    const fmsOcr = await worker.recognize(fmsInput);
                    const fmsText = fmsOcr.data.text || '';

                    // ── Registration: multi-variant, stop at first valid match ──
                    // Variant order (most likely to succeed first):
                    //   1. dedicated reg crop, inverted  (white-on-black badge)
                    //   2. dedicated reg crop, normal
                    //   3. FMS top-left corner, inverted (badge visible there too)
                    //   4. FMS top-left corner, normal
                    // Each is upscaled, recognized in single-line mode with an
                    // alpha+dash whitelist. Digit misreads (2→Z, 0→O...) are
                    // mapped back before pattern matching.
                    const REG_PAT = /[A-Z]-[A-Z]{4}/;
                    const fmsTopLeft = cropCanvasRegion(fmsCanvas, 0, 0, 0.45, 0.18);

                    const regSources = [
                        { canvas: regCanvas,  invert: true  },
                        { canvas: regCanvas,  invert: false },
                        { canvas: fmsTopLeft, invert: true  },
                        { canvas: fmsTopLeft, invert: false }
                    ];

                    await worker.setParameters({
                        tessedit_pageseg_mode: '7', // single text line
                        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-'
                    });

                    let registration = '';
                    for (const src of regSources) {
                        if (!src.canvas) continue;
                        const upFactor = src.canvas.width < 800 ? 3 : 2;
                        const variant = makeOcrVariant(upscaleCanvas(src.canvas, upFactor), src.invert);
                        const attempt = await worker.recognize(variant);
                        const cleaned = fixRegOcr((attempt.data.text || '').toUpperCase());
                        const m = cleaned.match(REG_PAT);
                        if (m) { registration = m[0]; break; }
                    }

                    // Last resort: scan the full FMS text (with confusion mapping)
                    if (!registration) {
                        const m = fixRegOcr(fmsText.toUpperCase()).match(REG_PAT);
                        if (m) registration = m[0];
                    }

                    // Reset worker params for any future passes
                    await worker.setParameters({
                        tessedit_pageseg_mode: '3',
                        tessedit_char_whitelist: ''
                    });

                    // DEP/DEST: four letters slash four letters
                    const depDest = fmsText.match(/([A-Z]{4})\s*\/\s*([A-Z]{4})/);

                    // Time extraction — column-position approach.
                    //
                    // The ACARS layout puts OUT and OFF on the SAME data line:
                    //   OUT/FUEL        OFF/FUEL          <- header line
                    //   00:33/025.1     00:46/024.7       <- data line (left=OUT, right=OFF)
                    //   IN/FUEL         ON/FUEL           <- header line
                    //   **:**/*****     **:**/*****       <- data line (left=IN, right=ON)
                    //
                    // Keyword-proximity search always grabs the wrong column because both
                    // times appear after the same header keyword region.
                    //
                    // Strategy: split OCR text into lines, find lines that contain exactly
                    // two HH:MM/fuel patterns — the left one is col-A, right one is col-B.
                    // Then use header lines immediately above to label col-A and col-B.
                    
                    const TIME_FUEL_PAT = /(\d{2}:\d{2})\/\s*\d+\.?\d*/g;

                    const lines = fmsText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                    
                    let out = '', off = '', inn = '', on = '';

                    // Helper: fix common Tesseract OCR digit confusions in times.
                    // In low-light cockpit shots, '0' is frequently read as '2' or '8',
                    // and '6' as '8'. We correct by cross-referencing the paired time:
                    // OUT and OFF appear on the same line — if one looks wrong relative
                    // to the other, try substituting the first digit.
                    const fixOcrTime = (t) => {
                        if (!t) return t;
                        // Times on this aircraft are always UTC, valid range 00-23
                        const [h, m] = t.split(':').map(Number);
                        if (h > 23) {
                            // First digit is likely a misread — try '0' substitution
                            const fixed = '0' + t[1] + ':' + t.slice(3);
                            const [fh] = fixed.split(':').map(Number);
                            if (fh <= 23) return fixed;
                        }
                        return t;
                    };

                    // Pair reconciliation: OUT→OFF (and ON→IN) gaps are taxi
                    // times — realistically 0 to 2 hours. If the gap is
                    // implausible, one time's first digit was likely misread
                    // (Tesseract reads '0' as '2' or '8' in low light). Try a
                    // '0' substitution on each side and keep the combination
                    // that produces a plausible taxi gap. Genuine
                    // over-midnight pairs (23:50→00:10) stay untouched.
                    const toMin = (t) => {
                        const [h, m] = t.split(':').map(Number);
                        return h * 60 + m;
                    };
                    const gapMin = (a, b) => (toMin(b) - toMin(a) + 1440) % 1440;
                    const zeroFirst = (t) => '0' + t.slice(1);
                    const PLAUSIBLE_GAP = 120; // minutes

                    const reconcileTimePair = (first, second) => {
                        if (!first || !second) return [first, second];
                        if (gapMin(first, second) <= PLAUSIBLE_GAP) return [first, second];
                        // Try correcting the first time
                        const f2 = zeroFirst(first);
                        if (f2 !== first && gapMin(f2, second) <= PLAUSIBLE_GAP) return [f2, second];
                        // Try correcting the second time
                        const s2 = zeroFirst(second);
                        if (s2 !== second && gapMin(first, s2) <= PLAUSIBLE_GAP) return [first, s2];
                        // Try correcting both
                        if (f2 !== first && s2 !== second && gapMin(f2, s2) <= PLAUSIBLE_GAP) return [f2, s2];
                        return [first, second];
                    };

                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i];
                        const matches = [...line.matchAll(TIME_FUEL_PAT)];
                        
                        if (matches.length >= 2) {
                            // Two time/fuel pairs on one line — left col and right col
                            const leftTime  = fixOcrTime(matches[0][1]);
                            const rightTime = fixOcrTime(matches[1][1]);
                            
                            // Look at header line above to determine which pair this is.
                            // Also check two lines above in case OCR merged a blank line.
                            const h1 = i > 0 ? lines[i-1].toUpperCase() : '';
                            const h2 = i > 1 ? lines[i-2].toUpperCase() : '';
                            const headerAbove = h1 + ' ' + h2;
                            
                            if (headerAbove.includes('OUT') && headerAbove.includes('OFF')) {
                                out = leftTime;
                                off = rightTime;
                            } else if (headerAbove.includes('IN') && headerAbove.includes('ON')) {
                                inn = leftTime;
                                on  = rightTime;
                            } else if (headerAbove.includes('BLOCK') || headerAbove.includes('FLIGHT')) {
                                // BLOCK/FLIGHT line — ignore
                            } else {
                                // No clear header — fill in order
                                if (!out && !off) { out = leftTime; off = rightTime; }
                                else if (!inn && !on) { inn = leftTime; on = rightTime; }
                            }
                        } else if (matches.length === 1) {
                            const h1 = i > 0 ? lines[i-1].toUpperCase() : '';
                            const h2 = i > 1 ? lines[i-2].toUpperCase() : '';
                            const headerAbove = h1 + ' ' + h2;
                            const singleTime = fixOcrTime(matches[0][1]);
                            if (headerAbove.includes('OUT') && !out) out = singleTime;
                            else if (headerAbove.includes('OFF') && !off) off = singleTime;
                            else if (headerAbove.includes('IN') && !inn) inn = singleTime;
                            else if (headerAbove.includes('ON') && !on) on = singleTime;
                        }
                    }

                    // Reconcile pairs: OUT→OFF is taxi-out, ON→IN is taxi-in.
                    // Corrects first-digit OCR misreads that survive per-time
                    // validation (e.g. 00:33 read as 20:33 — a valid hour, but
                    // an impossible 4h taxi against OFF 00:46).
                    [out, off] = reconcileTimePair(out, off);
                    [on, inn]  = reconcileTimePair(on, inn);

                    const result = {
                        registration: registration,
                        tailNumber: '',
                        from: depDest ? depDest[1] : '',
                        to: depDest ? depDest[2] : '',
                        out: out,
                        off: off,
                        on: on,
                        in: inn
                    };

                    if (registration) {
                        const known = aircraftRegistry.find(a => a.registration.toUpperCase() === registration);
                        if (known) {
                            result.tailNumber = known.tailNumber;
                            setOcrResult(result);
                            setCaptureStep('review');
                        } else {
                            setOcrResult(result);
                            setCaptureStep('tailEntry');
                        }
                    } else {
                        setOcrResult(result);
                        setCaptureStep('review');
                    }
                } catch (err) {
                    setCaptureError('OCR failed: ' + err.message);
                    setCaptureStep('review');
                    setOcrResult({ registration: '', tailNumber: '', from: '', to: '', out: '', off: '', on: '', in: '' });
                }
            };

            const confirmTailEntry = () => {
                if (!tailEntryValue.trim()) { alert('Enter a tail number to continue'); return; }
                const newEntry = { registration: ocrResult.registration, tailNumber: tailEntryValue.trim().toUpperCase() };
                setAircraftRegistry(prev => {
                    if (prev.find(a => a.registration === newEntry.registration)) return prev;
                    return [...prev, newEntry];
                });
                setOcrResult(prev => ({ ...prev, tailNumber: newEntry.tailNumber }));
                setCaptureStep('review');
            };

            const retakeRegistration = () => {
                setCapturedRegCanvas(null);
                setOcrResult(null);
                startCapture();
            };

            const applyOcrToForm = () => {
                setCurrentFlight(prev => ({
                    ...prev,
                    registration: ocrResult.registration || prev.registration,

                    to: ocrResult.to || prev.to,
                    out: ocrResult.out || prev.out,
                    off: ocrResult.off || prev.off,
                    on: ocrResult.on || prev.on,
                    in: ocrResult.in || prev.in
                }));
                cancelCapture();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const updateOcrField = (field, value) => {
                setOcrResult(prev => ({ ...prev, [field]: value }));

            // ============================================================

            const totals = flights.reduce((a, f) => {
                a.totalTime += parseFloat(f.totalTime || 0);
                a.pic += parseFloat(f.pic || 0);
                a.sic += parseFloat(f.sic || 0);
                a.simPIC += parseFloat(f.simPIC || 0);
                a.simSIC += parseFloat(f.simSIC || 0);
                a.day += parseFloat(f.day || 0);
                a.night += parseFloat(f.night || 0);
                a.instrument += parseFloat(f.instrument || 0);
                a.dayTakeoffs += parseInt(f.dayTakeoffs || 0);
                a.nightTakeoffs += parseInt(f.nightTakeoffs || 0);
                a.dayLandings += parseInt(f.dayLandings || 0);
                a.nightLandings += parseInt(f.nightLandings || 0);
                return a;
            }, { totalTime: 0, pic: 0, sic: 0, simPIC: 0, simSIC: 0, day: 0, night: 0, instrument: 0, dayTakeoffs: 0, nightTakeoffs: 0, dayLandings: 0, nightLandings: 0 });

            const calculateRollingTotals = () => {
                const now = new Date();
                const ninetyDaysAgo = new Date(now.getTime() - (90 * 24 * 60 * 60 * 1000));
                const sixMonthsAgo = new Date(now.getTime() - (180 * 24 * 60 * 60 * 1000));
                const oneYearAgo = new Date(now.getTime() - (365 * 24 * 60 * 60 * 1000));

                const rolling90Flights = flights.filter(f => new Date(f.date) >= ninetyDaysAgo);
                const rolling90 = rolling90Flights.reduce((sum, f) => sum + parseFloat(f.totalTime || 0), 0);
                const rolling90DayTO = rolling90Flights.reduce((sum, f) => sum + parseInt(f.dayTakeoffs || 0), 0);
                const rolling90NightTO = rolling90Flights.reduce((sum, f) => sum + parseInt(f.nightTakeoffs || 0), 0);
                const rolling90DayLdg = rolling90Flights.reduce((sum, f) => sum + parseInt(f.dayLandings || 0), 0);
                const rolling90NightLdg = rolling90Flights.reduce((sum, f) => sum + parseInt(f.nightLandings || 0), 0);
                
                const rolling180 = flights.filter(f => new Date(f.date) >= sixMonthsAgo)
                    .reduce((sum, f) => sum + parseFloat(f.totalTime || 0), 0);
                
                const rolling365 = flights.filter(f => new Date(f.date) >= oneYearAgo)
                    .reduce((sum, f) => sum + parseFloat(f.totalTime || 0), 0);

                return { 
                    rolling90, 
                    rolling90DayTO, 
                    rolling90NightTO, 
                    rolling90DayLdg, 
                    rolling90NightLdg,
                    rolling180, 
                    rolling365 
                };
            };

            const calculateCategoryTotals = () => {
                const categories = {
                    SEP: 0,
                    MEP: 0,
                    SET: 0,
                    MET: 0,
                    Jet: 0
                };
                
                flights.forEach(f => {
                    const time = parseFloat(f.totalTime || 0);
                    if (f.aircraftInfo && f.aircraftInfo.category) {
                        categories[f.aircraftInfo.category] = (categories[f.aircraftInfo.category] || 0) + time;
                    }
                });
                
                return categories;
            };

            const rollingTotals = calculateRollingTotals();
            const categoryTotals = calculateCategoryTotals();

            const exportToCSV = () => {

                    f.simSIC || '',
                    f.day,
                    f.night,
                    f.instrument,
                    f.dayTakeoffs,
                    f.nightTakeoffs,
                    f.dayLandings,
                    f.nightLandings,
                    f.approaches,
                    f.crewMember,
                    f.role,
                    f.remarks
                ]);
                const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `logbook-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
            };

ls.totalTime.toFixed(1)}</strong></td><td></td><td><strong>${totals.pic.toFixed(1)}</strong></td><td><strong>${totals.sic.toFixed(1)}</strong></td><td><strong>${totals.simPIC.toFixed(1)}</strong></td><td><strong>${totals.simSIC.toFixed(1)}</strong></td><td><strong>${totals.day.toFixed(1)}</strong></td><td><strong>${totals.night.toFixed(1)}</strong></td><td><strong>${totals.instrument.toFixed(1)}</strong></td><td><strong>${totals.dayTakeoffs}</strong></td><td><strong>${totals.nightTakeoffs}</strong></td><td><strong>${totals.dayLandings}</strong></td><td><strong>${totals.nightLandings}</strong></td><td colspan="4"></td></tr><tr class="category-row"><td colspan="12"><strong>CATEGORY TOTALS</strong></td><td colspan="3">SEP: ${categoryTotals.SEP.toFixed(1)}</td><td colspan="3">MEP: ${categoryTotals.MEP.toFixed(1)}</td><td colspan="4">Turbine: ${(categoryTotals.SET + categoryTotals.MET).toFixed(1)}</td><td colspan="7">Jet: ${categoryTotals.Jet.toFixed(1)}</td></tr></tbody></table></body></html>`);

                                <div><label className="block text-sm font-medium mb-1">SIM SIC (hrs)</label><input type="number" step="0.1" value={currentFlight.simSIC} onChange={(e) => setCurrentFlight({...currentFlight, simSIC: e.target.value})} className="w-full px-3 py-2 border rounded-lg" /></div>
                                <div><label className="block text-sm font-medium mb-1">Instrument</label><input type="number" step="0.1" value={currentFlight.instrument} onChange={(e) => setCurrentFlight({...currentFlight, instrument: e.target.value})} className="w-full px-3 py-2 border rounded-lg" /></div>
                                <div><label className="block text-sm font-medium mb-1">Day Takeoffs</label><input type="number" value={currentFlight.dayTakeoffs} onChange={(e) => setCurrentFlight({...currentFlight, dayTakeoffs: e.target.value})} className="w-full px-3 py-2 border rounded-lg" /></div>
                                <div><label className="block text-sm font-medium mb-1">Night Takeoffs</label><input type="number" value={currentFlight.nightTakeoffs} onChange={(e) => setCurrentFlight({...currentFlight, nightTakeoffs: e.target.value})} className="w-full px-3 py-2 border rounded-lg" /></div>
                                <div><label className="block text-sm font-medium mb-1">Day Landings</label><input type="number" value={currentFlight.dayLandings} onChange={(e) => setCurrentFlight({...currentFlight, dayLandings: e.target.value})} className="w-full px-3 py-2 border rounded-lg" /></div>
                                <div><label className="block text-sm font-medium mb-1">Night Landings</label><input type="number" value={currentFlight.nightLandings} onChange={(e) => setCurrentFlight({...currentFlight, nightLandings: e.target.value})} className="w-full px-3 py-2 border rounded-lg" /></div>
                                <div><label className="block text-sm font-medium mb-1">Approaches</label><input type="number" value={currentFlight.approaches} onChange={(e) => setCurrentFlight({...currentFlight, approaches: e.target.value})} className="w-full px-3 py-2 border rounded-lg" /></div>
                                <div className="md:col-span-2"><label className="block text-sm font-medium mb-1">Remarks</label><input type="text" value={currentFlight.remarks} onChange={(e) => setCurrentFlight({...currentFlight, remarks: e.target.value})} placeholder="Training, checkride, etc." className="w-full px-3 py-2 border rounded-lg" /></div>
                            </div>
                            <div className="mt-4 flex gap-2">
                                <button onClick={addFlight} className="flex-1 flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-lg font-medium">
                                    <Save />{editingFlight ? 'Update Flight' : 'Log Flight'}
                                </button>
                                {editingFlight && (
                                    <button onClick={cancelEdit} className="px-6 py-3 bg-gray-400 text-white rounded-lg font-medium">
                                        Cancel
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="max-w-4xl mx-auto">
                        <div className="bg-white rounded-lg shadow-lg p-6">
                            <div className="flex items-center justify-between mb-4">
                                <h2 className="text-xl font-bold">History ({flights.length})</h2>
                                <div className="flex gap-2">
                                    <button onClick={printLogbook} disabled={flights.length === 0} className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg text-sm disabled:bg-gray-300">
                                        <Printer />Print
                                    </button>
                                    <button onClick={exportToCSV} disabled={flights.length === 0} className="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm disabled:bg-gray-300">
                                        <Download />CSV
                                    </button>
                                </div>
                            </div>
                            {flights.length === 0 ? (
                                <p className="text-gray-500 text-center py-8">No flights logged yet</p>
                            ) : (
                                <div className="space-y-2">
                                    {sortedFlights.map((f) => (
                                        <div key={f.id} className="p-4 bg-gray-50 rounded-lg border hover:border-blue-300">
                                            <div className="font-medium text-lg">{f.date} - {f.aircraft} {f.tailNumber} ({f.registration})</div>
                                            {f.aircraftInfo && <div className="text-xs text-gray-500">{f.aircraftInfo.name} - {f.aircraftInfo.engines} Engine {f.aircraftInfo.engineType}</div>}
                                            <div className="text-gray-600 mt-1">{f.from} → {f.to}</div>
                                            {f.crewMember && <div className="text-sm text-blue-600 mt-1">Crew: {f.crewMember} ({f.role})</div>}
                                            <div className="text-sm text-gray-500 mt-1">OUT: {f.out} | OFF: {f.off} | ON: {f.on} | IN: {f.in} {f.timeZone && `(${f.timeZone})`}</div>
                                            <div className="grid grid-cols-2 md:grid-cols-5 gap-2 mt-2 text-sm">
                                                <div><span className="text-gray-500">Flight:</span> {f.flightTime}h</div>
                                                <div><span className="text-gray-500">Air:</span> {f.airTime}h</div>
                                                <div><span className="text-gray-500">PIC:</span> {f.pic}h</div>
                                                <div><span className="text-gray-500">Day/Night:</span> {f.day}/{f.night}h</div>
                                                <div><span className="text-gray-500">TO/Ldg:</span> {(f.dayTakeoffs || 0) + (f.nightTakeoffs || 0)}/{f.dayLandings}/{f.nightLandings}</div>
                                            </div>
                                            {(f.simPIC || f.simSIC) && (
                                                <div className="text-sm text-purple-600 mt-1">SIM - PIC: {f.simPIC || 0}h | SIC: {f.simSIC || 0}h</div>
                                            )}
                                            {f.remarks && <div className="mt-2 text-sm text-gray-600 italic">{f.remarks}</div>}
                                            <div className="flex gap-2 mt-3">
                                                <button onClick={() => editFlight(f)} className="flex-1 px-3 py-1 bg-blue-500 text-white text-sm rounded hover:bg-blue-600">
                                                    Edit
                                                </button>
                                                <button onClick={() => deleteFlight(f.id)} className="flex-1 px-3 py-1 bg-red-500 text-white text-sm rounded hover:bg-red-600">
                                                    Delete
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ============ PHOTO CAPTURE OVERLAY ============ */}
                    {(captureStep === 'registration' || captureStep === 'fms') && (
                        <div className="capture-overlay">
                            <video ref={videoRef} autoPlay playsInline muted className="capture-video"></video>
                            <div
                                className="guide-box"
                                style={{
                                    left: `${GUIDE_BOXES[captureStep].xPct * 100}%`,
                                    top: `${GUIDE_BOXES[captureStep].yPct * 100}%`,
                                    width: `${GUIDE_BOXES[captureStep].wPct * 100}%`,
                                    height: `${GUIDE_BOXES[captureStep].hPct * 100}%`
                                }}
                            ></div>
                            <div className="capture-label">
                                {captureStep === 'registration'
                                    ? 'Step 1 of 2: Align REGISTRATION plate in the box'
                                    : 'Step 2 of 2: Align ACARS / FMS screen in the box'}
                            </div>
                            <button className="capture-cancel" onClick={cancelCapture}>Cancel</button>
                            <button className="capture-shutter" onClick={handleShutter}></button>
                        </div>
                    )}

                    {captureStep === 'processing' && (
                        <div className="capture-overlay items-center justify-center">
                            <div className="text-white text-lg font-medium">Reading photo… (OCR processing)</div>
                        </div>
                    )}

                    {captureStep === 'tailEntry' && ocrResult && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-lg shadow-lg p-6 max-w-sm w-full">
                                <h3 className="text-lg font-bold mb-2">New Registration Detected</h3>
                                <p className="text-sm text-gray-600 mb-1">Registration: <strong>{ocrResult.registration || '(not read)'}</strong></p>
                                <p className="text-sm text-gray-600 mb-4">This tail hasn't been flown before — enter the tail number to link it for next time.</p>
                                <input
                                    type="text"
                                    value={tailEntryValue}
                                    onChange={(e) => setTailEntryValue(e.target.value)}
                                    placeholder="Tail Number"
                                    className="w-full px-3 py-2 border rounded-lg mb-4"
                                    autoFocus
                                />
                                <div className="flex gap-2">
                                    <button onClick={confirmTailEntry} className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium">Save & Continue</button>
                                    <button onClick={cancelCapture} className="px-4 py-2 bg-gray-300 rounded-lg">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {captureStep === 'review' && ocrResult && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white rounded-lg shadow-lg p-6 max-w-md w-full my-8">
                                <h3 className="text-lg font-bold mb-1">Review Captured Data</h3>
                                <p className="text-xs text-gray-500 mb-4">Confirm or correct before applying to the flight form.</p>
                                {captureError && <div className="mb-3 p-2 bg-yellow-50 text-yellow-800 text-xs rounded">{captureError}</div>}
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="col-span-2">
                                        <label className="block text-xs font-medium mb-1">Registration</label>
                                        <input type="text" value={ocrResult.registration} onChange={(e) => updateOcrField('registration', e.target.value.toUpperCase())} className="w-full px-3 py-2 border rounded-lg" />
                                    </div>
                                    <div className="col-span-2">
                                        <label className="block text-xs font-medium mb-1">Tail Number</label>
                                        <input type="text" value={ocrResult.tailNumber} onChange={(e) => updateOcrField('tailNumber', e.target.value.toUpperCase())} className="w-full px-3 py-2 border rounded-lg" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium mb-1">From</label>
                                        <input type="text" value={ocrResult.from} onChange={(e) => updateOcrField('from', e.target.value.toUpperCase())} className="w-full px-3 py-2 border rounded-lg" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium mb-1">To</label>
                                        <input type="text" value={ocrResult.to} onChange={(e) => updateOcrField('to', e.target.value.toUpperCase())} className="w-full px-3 py-2 border rounded-lg" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium mb-1">OUT</label>
                                        <input type="time" value={ocrResult.out} onChange={(e) => updateOcrField('out', e.target.value)} className="w-full px-3 py-2 border rounded-lg" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium mb-1">OFF</label>
                                        <input type="time" value={ocrResult.off} onChange={(e) => updateOcrField('off', e.target.value)} className="w-full px-3 py-2 border rounded-lg" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium mb-1">ON</label>
                                        <input type="time" value={ocrResult.on} onChange={(e) => updateOcrField('on', e.target.value)} className="w-full px-3 py-2 border rounded-lg" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-medium mb-1">IN</label>
                                        <input type="time" value={ocrResult.in} onChange={(e) => updateOcrField('in', e.target.value)} className="w-full px-3 py-2 border rounded-lg" />
                                    </div>
                                </div>
                                <div className="flex gap-2 mt-5">
                                    <button onClick={applyOcrToForm} className="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium">Apply to Flight Form</button>
                                </div>
                                <div className="flex gap-2 mt-2">
                                    <button onClick={retakeRegistration} className="flex-1 px-3 py-2 bg-gray-200 rounded-lg text-sm">Retake Photos</button>
                                    <button onClick={cancelCapture} className="flex-1 px-3 py-2 bg-gray-200 rounded-lg text-sm">Discard</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PilotLogbook />);
    </script>
</body>
</html>
